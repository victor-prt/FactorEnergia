# FactorEnergia — entorno de evaluación (SQL Server + PHP Apache + Yii2)
# Requiere Docker con soporte para imágenes linux/amd64 (SQL Server).

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8080:80"
    volumes:
      - ./yii2-app:/var/www/html
    environment:
      DB_DSN: "sqlsrv:Server=db,1433;Database=factor;Encrypt=yes;TrustServerCertificate=1"
      DB_USER: sa
      DB_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
      ERSE_BASE_URL: "https://api.erse.pt/v2"
      ERSE_BEARER_TOKEN: "${ERSE_BEARER_TOKEN:-}"
      ERSE_MOCK: "${ERSE_MOCK:-0}"
      COOKIE_VALIDATION_KEY: "${COOKIE_VALIDATION_KEY:-cambia-esta-clave-en-produccion-32b}"
      YII_ENV: dev
      YII_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
